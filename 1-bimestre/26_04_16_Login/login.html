<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Sistema Login</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<div id="login">

  <p id="erro"></p>
</div>

<div id="menu" style="display: none;">
  <h2>Menu</h2>

  <button>Opção 1</button>
  <button>Opção 2</button>
  <button onclick="sair()">Sair</button>
</div>

<script src="login.js"></script>
</body>
</html>
